name: Compile Media Server Plugin

on:
  push:
    branches: [ "main" ]
    paths:
      - "media-plugin/**"
      - "shared/**"
      - "build_plugin.ps1"
      - ".github/workflows/build-plugin.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "media-plugin/**"
      - "shared/**"
      - "build_plugin.ps1"
      - ".github/workflows/build-plugin.yml"

jobs:
  build:
    name: Compile Media Server Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0.x'

      - name: Restore dependencies
        run: dotnet restore media-plugin/plugin.csproj

      - name: Build plugin assembly
        run: dotnet build media-plugin/plugin.csproj -c Release -o dist/media-plugin

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v3
        with:
          name: media-plugin-dll
          path: dist/media-plugin/RetroConsolePlugin.dll
