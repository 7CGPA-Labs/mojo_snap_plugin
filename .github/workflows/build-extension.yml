name: Package WebExtension

on:
  push:
    branches: [ "main" ]
    paths:
      - "extension/**"
      - "shared/**"
      - "build_extension.ps1"
      - ".github/workflows/build-extension.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "extension/**"
      - "shared/**"
      - "build_extension.ps1"
      - ".github/workflows/build-extension.yml"

jobs:
  build:
    name: Package WebExtension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Assemble Extension Assets
        run: |
          mkdir -p dist/extension
          cp -r extension/* dist/extension/
          mkdir -p dist/extension/shared
          cp -r shared/* dist/extension/shared/

      - name: Zip WebExtension Package
        run: |
          cd dist/extension
          zip -r ../extension.zip .

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v3
        with:
          name: extension
          path: dist/extension.zip
