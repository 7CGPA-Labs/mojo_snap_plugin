<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mojo Snap Console</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --accent-color: #52B54B;
            --text-color: #f0f0f0;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #top-bar {
            height: 48px;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .icon-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .icon-btn:hover, .icon-btn:focus-visible {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            outline: none;
        }
        .icon-btn.primary {
            background: var(--accent-color);
            color: white;
        }
        .icon-btn.primary:hover, .icon-btn.primary:focus-visible {
            background: #45a03f;
        }
        .title {
            flex-grow: 1;
            font-weight: 600;
            font-size: 16px;
            text-align: center;
            opacity: 0.9;
        }
        #game-panel {
            flex-grow: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
            border: 0;
            outline: none;
            background: #000;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
    <!-- Embed standard libraries from the served plugin paths -->
    <script src="shared/cores/browserfs.min.js?v=4" defer></script>
    <script src="shared/gameplay.js?v=4" defer></script>
    <script src="play.js?v=4" defer></script>
</head>
<body>
    <header id="top-bar" role="banner">
        <button class="icon-btn" onclick="window.exitGameplay()" aria-label="Exit Game" title="Exit Game">
            <span aria-hidden="true">⬅️</span> Exit
        </button>
        <div class="title" role="heading" aria-level="1">Mojo Snap Console</div>
        <button class="icon-btn" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {key: 'Escape', code: 'Escape', keyCode: 27}))" aria-label="Open Emulator Menu" title="Open Menu">
            <span aria-hidden="true">⚙️</span> Menu
        </button>
        <button class="icon-btn primary" onclick="document.getElementById('canvas').focus()" aria-label="Focus Game Window">
            <span aria-hidden="true">🎮</span> Play
        </button>
    </header>
    <main id="game-panel" role="main" aria-label="Game Screen">
        <canvas id="canvas" tabindex="0" aria-label="Game Canvas. Use arrow keys and Z/X/A/S to play."></canvas>
    </main>
</body>
</html>
