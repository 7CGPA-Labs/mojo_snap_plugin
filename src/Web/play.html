<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mojo Snap Console</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        #game-panel {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            border: 0;
            outline: none;
        }
    </style>
    <!-- Embed standard libraries from the served plugin paths -->
    <script src="shared/cores/browserfs.min.js?v=2" defer></script>
    <script src="shared/gameplay.js?v=2" defer></script>
    <script src="play.js?v=2" defer></script>
</head>
<body>
    <div id="game-panel">
        <canvas id="canvas"></canvas>
    </div>
</body>
</html>
