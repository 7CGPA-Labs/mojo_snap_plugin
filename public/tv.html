<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro Web Console</title>
    <link href="/assets/css/common.css" rel="stylesheet">
    <link href="/assets/css/lobby.css" rel="stylesheet">
    <link href="/assets/css/gameplay.css" rel="stylesheet">
    <link href="/fonts/press-start-2p/index.css" rel="stylesheet">
    <link rel="icon" href="/assets/favicon/favicon32.png" type="image/x-icon">
    <script src="/assets/js/network.js" defer></script>
    <script src="/assets/js/gameplay.js" defer></script>
    <script src="/assets/js/lobby.js" defer></script>
</head>
<body>

    <!-- Background Music -->
    <audio id="lobby-audio" src="/assets/audio/lobby.mp3" loop preload="auto"></audio>

    <!-- Lobby View -->
    <div id="lobby-view">
        <div class="hero-spotlight">
            <img class="lobby-logo" src="/assets/favicon/favicon32.png" alt="System Logo">
            <img id="hero-bg" src="">
            <div class="hero-content">
                <h1 id="hero-title">AWAITING SELECTION</h1>
                <div id="hero-meta">CONSOLE | YEAR</div>
                <p id="hero-desc">Hover over a game card below to reveal the official metadata configurations.</p>
            </div>
        </div>
        <div class="lobby-controls">
            <button class="btn" style="margin-right: auto; padding: 8px 12px; font-size: 8px; border: 2px solid #00a8e1; background: transparent; color: #00a8e1;" onclick="openLocalRomModal()">[+] LOAD LOCAL ROM</button>
            <span style="font-size: 8px; color: #8197a4; margin-right: 15px;">SORT BY:</span>
            <select id="sort-select" class="sort-select" onchange="sortLibrary(this.value)">
                <option value="title_asc">TITLE (A-Z)</option>
                <option value="title_desc">TITLE (Z-A)</option>
                <option value="console">SYSTEM</option>
                <option value="year_desc">NEWEST</option>
                <option value="year_asc">OLDEST</option>
            </select>
        </div>
        <div class="deck-wrapper">
            <button id="scroll-left" class="scroll-btn" onclick="scrollDeck(-1)">◀</button>
            <div class="curated-rows" id="game-rows"></div>
            <button id="scroll-right" class="scroll-btn" onclick="scrollDeck(1)">▶</button>
        </div>
    </div>

    <!-- Gameplay View -->
    <div id="gameplay-view" class="webos-clean-ui">
        <div id="game-panel">
            <div id="game-div"></div>
        </div>
        
        <div class="system-footer">
            <button class="btn btn-danger" onclick="ApplicationState.exitGameplay()">[EXIT GAME]</button>
            
            <div class="player-status-container">
                <div class="status-chip" id="p1-chip"><div class="indicator"></div> <span id="p1-name">P1: OFFLINE</span></div>
                <div class="status-chip" id="p2-chip"><div class="indicator"></div> <span id="p2-name">P2: OFFLINE</span></div>
            </div>
            
            <button class="btn" onclick="openQrModal()">[CONTROLLER QR]</button>
        </div>
    </div>

    <!-- Absolute Positioned QR Modal -->
    <div id="qr-modal-overlay" onclick="this.style.display = 'none';">
        <div class="qr-modal-box" onclick="event.stopPropagation();">
            <div style="font-size: 10px; margin-bottom: 15px; color: #00a8e1;">SCAN TO CONNECT</div>
            <div id="qrcode-container"></div>
            <button class="btn" style="margin-top: 15px;" onclick="document.getElementById('qr-modal-overlay').style.display = 'none';">CLOSE</button>
        </div>
    </div>

    <!-- Absolute Positioned Local ROM Modal -->
    <div id="local-rom-modal" class="modal-overlay" onclick="closeLocalRomModal()">
        <div class="modal-box" onclick="event.stopPropagation();">
            <div class="modal-title">Load Local ROM</div>
            <div class="modal-body">
                <div class="input-group">
                    <label class="input-label" for="rom-file-input">Select ROM File</label>
                    <input type="file" id="rom-file-input" class="file-input" accept=".nes,.smc,.sfc,.md,.smd,.gen,.gba,.iso,.cue,.chd,.bin,.img" />
                </div>
                <div class="input-group">
                    <label class="input-label">Controller Layout</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="layout-preference" value="AUTO" checked />
                            <span>Standard Layout (Auto-detect)</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="layout-preference" value="MK_LAYOUT" />
                            <span>MK Layout (6-Button Fightpad)</span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeLocalRomModal()">CANCEL</button>
                <button class="btn btn-primary" onclick="launchLocalROM()">LAUNCH GAME</button>
            </div>
        </div>
    </div>
</body>
</html>
