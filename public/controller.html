<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Arcade Gamepad Terminal</title>
    <link rel="icon" href="/favicon/favicon32.png" type="image/x-icon">
    <link href="/fonts/press-start-2p/index.css" rel="stylesheet">
    <style>
        body {
            background-color: #12131c; margin: 0; padding: 0;
            user-select: none; -webkit-user-select: none;
            font-family: 'Press Start 2P', sans-serif; height: 100vh;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        
        #gateway-panel {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #1f2029; padding: 30px; border-radius: 8px; border: 3px solid #ff4a5a;
        }
        #gateway-panel h2 { font-size: 12px; color: #fff; margin-bottom: 20px; }
        .input-box { background: #12131c; border: 2px solid #3a3c4d; padding: 12px; color: #00f2fe; font-family: 'Press Start 2P'; font-size: 12px; text-align: center; width: 180px; margin-bottom: 20px; border-radius: 4px; text-transform: uppercase; }
        .join-btn { background: #00f2fe; color: #12131c; border: none; padding: 12px 20px; font-family: 'Press Start 2P'; font-size: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; }

        /* Fullscreen Landscape Layout Master Matrix */
        #gamepad-panel {
            width: 100vw; height: 100vh; display: none;
            justify-content: space-between; align-items: center; box-sizing: border-box; padding: 40px;
        }
        .dpad-container { display: grid; grid-template-columns: repeat(3, 75px); grid-template-rows: repeat(3, 75px); background: #1f2029; padding: 10px; border-radius: 50%; }
        
        /* Direct touch interactions bypass element tracking; CSS triggers handled programmatically */
        .d-btn { background: #3a3c4d; border: 2px solid #12131c; color: #00f2fe; font-size: 20px; display: flex; align-items: center; justify-content: center; border-radius: 8px; pointer-events: none; }
        .up { grid-column: 2; grid-row: 1; border-bottom: none; border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
        .left { grid-column: 1; grid-row: 2; border-right: none; border-top-right-radius: 0; border-bottom-right-radius: 0; }
        .right { grid-column: 3; grid-row: 2; border-left: none; border-top-left-radius: 0; border-bottom-left-radius: 0; }
        .down { grid-column: 2; grid-row: 3; border-top: none; border-top-left-radius: 0; border-top-right-radius: 0; }
        
        .action-deck { display: flex; flex-direction: column; gap: 15px; transform: rotate(-15deg); align-items: flex-end; }
        .act-row { display: flex; gap: 25px; }
        .top-row { margin-right: 40px; }
        .act-btn { width: 80px; height: 80px; border-radius: 50%; background: #ff4a5a; color: #fff; border: 4px solid #12131c; font-size: 22px; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .trig-btn { width: 80px; height: 35px; background: #3a3c4d; border: 2px solid #12131c; color: #00f2fe; border-radius: 8px; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        
        /* Active touch visual indicators */
        .d-btn.pressed-state { background: #00f2fe; color: #12131c; }
        .act-btn.pressed-state { background: #ff7380; transform: scale(0.95); }
        .trig-btn.pressed-state { background: #00f2fe; color: #12131c; }

        .center-deck { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
        .sys-btn { background: #1f2029; border: 2px solid #3a3c4d; color: #fff; padding: 10px 15px; border-radius: 8px; font-family: 'Press Start 2P'; font-size: 10px; pointer-events: none; }
        .sys-btn.pressed-state { background: #00f2fe; color: #12131c; border-color: #00f2fe; }

        #disconnect-btn { position: absolute; top: 15px; right: 20px; background: transparent; border: 2px solid #ff4a5a; color: #ff4a5a; font-family: 'Press Start 2P'; font-size: 8px; padding: 8px; border-radius: 4px; z-index: 100; cursor: pointer; }
        #disconnect-btn:active { background: #ff4a5a; color: #12131c; }

        #brand { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); font-size: 8px; color: #4e5166; }
    </style>
</head>
<body>

    <div id="gateway-panel">
        <h2>ENTER PLAYER HANDLE</h2>
        <input type="text" id="nickname-input" class="input-box" maxlength="8" placeholder="NICKNAME" autocomplete="off">
        <button class="join-btn" onclick="submitRegistration()">LINK STATION</button>
    </div>

    <div id="gamepad-panel">
        <button id="disconnect-btn" onclick="disconnectController()" ontouchstart="event.stopPropagation(); disconnectController();">DISCONNECT</button>
        
        <div id="lobby-overlay" style="display: none; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(18,19,28,0.92); z-index: 50; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;">
            <div style="color: #00f2fe; font-size: 14px; margin-bottom: 12px;">LOBBY LINKED</div>
            <div style="color: #8e92a8; font-size: 8px; line-height: 1.5;">WAITING FOR TV SELECTION...</div>
        </div>

        <div class="trigger-deck" id="trigger-deck" style="display: none; position: absolute; top: 15px; left: 40px; right: 150px; justify-content: space-between;">
            <button class="trig-btn" data-btn="L1">L1</button>
            <button class="trig-btn" data-btn="R1">R1</button>
        </div>

        <div class="dpad-container">
            <button class="d-btn up" data-btn="UP">▲</button>
            <button class="d-btn left" data-btn="LEFT">◀</button>
            <button class="d-btn right" data-btn="RIGHT">▶</button>
            <button class="d-btn down" data-btn="DOWN">▼</button>
        </div>

        <div class="center-deck">
            <button class="sys-btn" data-btn="SELECT">SELECT</button>
            <button class="sys-btn" data-btn="MENU" style="color: #00f2fe; border-color: #00f2fe;">MENU</button>
            <button class="sys-btn" data-btn="PAUSE" style="color: #ff4a5a; border-color: #ff4a5a;">PAUSE</button>
            <button class="sys-btn" data-btn="START">START</button>
        </div>

        <div class="action-deck" id="action-deck"></div>
    </div>

    <div id="brand">MATRIX LINK SYSTEM</div>

    <script>
        const socket = new WebSocket(`ws://${window.location.host}`);
        const brandLabel = document.getElementById('brand');
        let structuralButtons = {};
        let macroComboTriggered = false;
        let wakeLock = null;
        let myPlayerIndex = 0; // Tracks internal binary origin slot

        // High-Speed Binary Compression Dictionary
        const BINARY_MAP = {
            'Y': 1, 'B': 2, 'L1': 3, 'X': 4, 'A': 5, 'R1': 6,
            'UP': 7, 'DOWN': 8, 'LEFT': 9, 'RIGHT': 10,
            'SELECT': 11, 'START': 12, 'MENU': 13, 'PAUSE': 14, 'SAVE_STATE': 15
        };

        // Request the browser to keep the screen awake
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Screen Wake Lock acquired');
                } catch (err) {
                    console.error(`Wake Lock error: ${err.name}, ${err.message}`);
                }
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock(); // Re-request when returning to the app
            }
        });

        function submitRegistration() {
            const nickField = document.getElementById('nickname-input');
            
            // Trigger browser full-screen mechanics safely via explicit click gesture
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            else if (document.documentElement.webkitRequestFullscreen) document.documentElement.webkitRequestFullscreen();

            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => console.log("Orientation lock handled."));
            }

            requestWakeLock();

            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'REGISTER_CONTROLLER', nickname: nickField.value }));
            }
        }

        function disconnectController() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => wakeLock = null);
            }
            if (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING) {
                socket.close();
            }
            window.location.reload(); // Clean reset back to the gateway screen
        }

        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'ASSIGNMENT_CONFIRM') {
                myPlayerIndex = msg.playerIndex || 0; // Cache origin for binary encoding
                
                document.getElementById('gateway-panel').style.display = 'none';
                document.getElementById('gamepad-panel').style.display = 'flex';
                brandLabel.innerText = `LATCHED: ${msg.slot}`;
                
                document.getElementById('lobby-overlay').style.display = 'flex'; // Default to lobby barrier on connect
                
                if (msg.slot === 'SPECTATOR') {
                    document.getElementById('lobby-overlay').innerHTML = '<div style="color: #ff4a5a; font-size: 14px; margin-bottom: 12px;">SPECTATOR MODE</div><div style="color: #8e92a8; font-size: 8px; line-height: 1.5;">MAX PLAYERS REACHED. INPUTS DISABLED.</div>';
                }
                // Map bounding calculations after interface rendering stabilizes
                setTimeout(recalculateButtonCoordinates, 200);
            }
            
            if (msg.type === 'TV_STATE_CHANGE') {
                if (msg.state === 'GAMEPLAY') {
                    if (brandLabel.innerText !== 'LATCHED: SPECTATOR') document.getElementById('lobby-overlay').style.display = 'none';
                    
                    const core = msg.core ? msg.core.toUpperCase() : 'NES';
                    const layout = msg.layout ? msg.layout.toUpperCase() : null;
                    
                    applyDynamicLayout(core, layout);
                } else {
                    document.getElementById('lobby-overlay').style.display = 'flex';
                }
            }
        };

        function applyDynamicLayout(core, layoutCode) {
            const triggerDeck = document.getElementById('trigger-deck');
            const actionDeck = document.getElementById('action-deck');
            const activeLayout = layoutCode || core;

            // ⚔️ Custom 6-Button Fighting Deck (Milestone 13)
            if (activeLayout === 'MK_LAYOUT') {
                // Explicit PS1 MK Layout Mapping
                triggerDeck.style.display = 'none'; // Triggers are structurally moved to the face deck
                actionDeck.innerHTML = `
                    <div style="display: grid; grid-template-columns: auto auto; grid-template-rows: auto auto auto auto; gap: 12px; justify-items: center; align-items: center; transform: rotate(-5deg);">
                        <div style="grid-column: 1 / span 2; display: flex; gap: 20px;">
                            <button class="act-btn" data-btn="Y" style="background:#1f2235; border-color:#00f2fe; width:70px; height:70px; font-size:18px;">HP</button>
                            <button class="act-btn" data-btn="X" style="background:#1f2235; border-color:#00f2fe; width:70px; height:70px; font-size:18px;">HK</button>
                        </div>
                        <div style="grid-column: 1 / span 2;">
                            <button class="act-btn block-btn" data-btn="L1" style="background:#4e5166; width:65px; height:65px; font-size:16px;">BL</button>
                        </div>
                        <div style="grid-column: 1 / span 2; display: flex; gap: 20px;">
                            <button class="act-btn" data-btn="B" style="background:#ff4a5a; border-color:#12131c; width:70px; height:70px; font-size:18px;">LP</button>
                            <button class="act-btn" data-btn="A" style="background:#ff4a5a; border-color:#12131c; width:70px; height:70px; font-size:18px;">LK</button>
                        </div>
                        <div style="grid-column: 1 / span 2;">
                            <button class="act-btn" data-btn="R1" style="background:#00f2fe; color:#12131c; width:90px; height:40px; border-radius:12px; font-size:14px;">RN</button>
                        </div>
                    </div>
                `;
            } else if (activeLayout === 'SNES' || activeLayout === 'PS1' || activeLayout === 'GBA') {
                triggerDeck.style.display = 'flex';
                actionDeck.innerHTML = `
                    <div class="act-row top-row" style="display: flex;">
                        <button class="act-btn" data-btn="Y">Y</button>
                        <button class="act-btn" data-btn="X">X</button>
                    </div>
                    <div class="act-row bottom-row">
                        <button class="act-btn" data-btn="B">B</button>
                        <button class="act-btn" data-btn="A">A</button>
                    </div>
                `;
            } else if (activeLayout === 'SEGA' || activeLayout === 'MD' || activeLayout === 'GENESIS') {
                triggerDeck.style.display = 'none';
                actionDeck.innerHTML = `
                    <div class="act-row top-row" style="display: flex; margin-right: 20px;">
                        <button class="act-btn" data-btn="Y" style="width:65px; height:65px; font-size:16px;">X</button>
                        <button class="act-btn" data-btn="X" style="width:65px; height:65px; font-size:16px;">Y</button>
                        <button class="act-btn" data-btn="L1" style="width:65px; height:65px; font-size:16px;">Z</button>
                    </div>
                    <div class="act-row bottom-row" style="margin-left: 20px;">
                        <button class="act-btn" data-btn="B" style="width:65px; height:65px; font-size:16px;">A</button>
                        <button class="act-btn" data-btn="A" style="width:65px; height:65px; font-size:16px;">B</button>
                        <button class="act-btn" data-btn="R1" style="width:65px; height:65px; font-size:16px;">C</button>
                    </div>
                `;
            } else {
                // Default / NES 2-Button Base
                triggerDeck.style.display = 'none';
                actionDeck.innerHTML = `
                    <div class="act-row bottom-row">
                        <button class="act-btn" data-btn="B">B</button>
                        <button class="act-btn" data-btn="A">A</button>
                    </div>
                `;
            }
            
            // CRITICAL: Force recalculation of multi-touch bounding boxes mapped to the new geometric layout
            setTimeout(recalculateButtonCoordinates, 300); // Increased timeout to guarantee DOM reflow on mobile WebKit engines
        }

        function recalculateButtonCoordinates() {
            structuralButtons = {};
            document.querySelectorAll('#gamepad-panel button').forEach(btn => {
                const name = btn.getAttribute('data-btn');
                if (!name) return; // Safely ignore non-gamepad UI elements like the disconnect button
                
                const rect = btn.getBoundingClientRect();
                if (rect.width === 0 || rect.height === 0) return; // Natively ignore hidden elements (like the trigger deck in MK_LAYOUT)
                
                structuralButtons[name] = {
                    rect: rect,
                    pressed: false,
                    element: btn
                };
            });
        }

        // Bounding-Box Multi-Touch Parser Loop Engine
        function parseTouchEngine(e) {
            e.preventDefault();
            const activeFingersThisFrame = new Set();

            // Intercept positions for all fingers currently touching the display panel
            for (let i = 0; i < e.touches.length; i++) {
                const t = e.touches[i];
                
                for (const name in structuralButtons) {
                    const b = structuralButtons[name];
                    if (t.clientX >= b.rect.left && t.clientX <= b.rect.right &&
                        t.clientY >= b.rect.top && t.clientY <= b.rect.bottom) {
                        activeFingersThisFrame.add(name);
                    }
                }
            }

            // Sync structural signal changes down the WebSocket connection frame
            for (const name in structuralButtons) {
                const b = structuralButtons[name];
                const activeNow = activeFingersThisFrame.has(name);

                if (activeNow && !b.pressed) {
                    b.pressed = true;
                    b.element.classList.add('pressed-state');
                    transmit(name, 'DOWN');
                    if (navigator.vibrate) navigator.vibrate(15); // Crisp haptic feedback pop
                } else if (!activeNow && b.pressed) {
                    b.pressed = false;
                    b.element.classList.remove('pressed-state');
                    transmit(name, 'UP');
                }
            }

            // Detect SELECT + START combination for Save State Macro
            const isSelect = activeFingersThisFrame.has('SELECT');
            const isStart = activeFingersThisFrame.has('START');
            
            if (isSelect && isStart && !macroComboTriggered) {
                macroComboTriggered = true;
                transmit('SAVE_STATE', 'DOWN');
                if (navigator.vibrate) navigator.vibrate([30, 40, 30]); // Distinct double-pulse for macro success
            } else if ((!isSelect || !isStart) && macroComboTriggered) {
                transmit('SAVE_STATE', 'UP');
                macroComboTriggered = false;
            }
        }

        function transmit(buttonName, state) {
            if (myPlayerIndex === 0) return; // Spectators do not flood the network
            
            const buttonCode = BINARY_MAP[buttonName];
            if (!buttonCode) return;

            const isDown = state === 'DOWN';
            let byte0 = 0;
            if (myPlayerIndex === 1) byte0 = isDown ? 1 : 2;
            else if (myPlayerIndex === 2) byte0 = isDown ? 3 : 4;
            
            const payload = new Uint8Array([byte0, buttonCode]);
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(payload); // Dispatch highly efficient 2-Byte ArrayBuffer
            }
        }

        // Capture multi-finger interactions globally across the interface canvas
        const pad = document.getElementById('gamepad-panel');
        pad.addEventListener('touchstart', parseTouchEngine, { passive: false });
        pad.addEventListener('touchmove', parseTouchEngine, { passive: false });
        pad.addEventListener('touchend', parseTouchEngine, { passive: false });
        pad.addEventListener('touchcancel', parseTouchEngine, { passive: false });

        window.addEventListener('resize', () => setTimeout(recalculateButtonCoordinates, 200));
        window.addEventListener('orientationchange', () => setTimeout(recalculateButtonCoordinates, 300));
    </script>
</body>
</html>
